server:
  port: 8000

spring:
  application:
    name: sifen-wrapper
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sifen}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:mauri4974088}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

security:
  jwt:
    # Clave secreta para firmar JWT (mínimo 256 bits / 32 chars).
    # En producción usar variable de entorno JWT_SECRET
    secret: ${JWT_SECRET:cambia-esta-clave-en-produccion-min-32-chars!!}
    access-token-expiration: 3600
    refresh-token-expiration: 604800
  encryption:
    # Clave AES-256 en base64 (32 bytes). Generar con:
    # openssl rand -base64 32
    key: ${ENCRYPTION_KEY:GRPqRtzme6fp5J2kWdlJomzLXxxQY+/iDWgrNGk6PC4=}

sifen:
  batch:
    enabled: ${SIFEN_BATCH_ENABLED:true}
    send-interval: ${SIFEN_BATCH_SEND_INTERVAL:60000}
    poll-interval: ${SIFEN_BATCH_POLL_INTERVAL:600000}
    max-per-lote: ${SIFEN_BATCH_MAX_PER_LOTE:50}
    min-wait-before-poll: ${SIFEN_BATCH_MIN_WAIT:600}
    max-poll-age-hours: ${SIFEN_BATCH_MAX_AGE:48}

resend:
  api-key: ${RESEND_API_KEY:}
  from-email: ${RESEND_FROM_EMAIL:no-reply@synctema.com}
  from-name: ${RESEND_FROM_NAME:SYNCTEMA}

logging:
  level:
    com.ratones: DEBUG
    com.roshka.sifen: DEBUG
